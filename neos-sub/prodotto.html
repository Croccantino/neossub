<script>
// Product data - in a real implementation, this would come from a database or API
const products = {
    930: {
        title: "Ogiva Articolata",
        description: "Ogiva articolata per fucili subacquei. Design ergonomico e prestazioni eccellenti.",
        image: "public/catalogo/SANY1906.jpg"
    },
    7: {
        title: "Boa Siluro con Tasca",
        description: "Boa siluro con tasca porta attrezzi, ideale per la pesca in apnea.",
        image: "public/catalogo/boa%20tasca.jpg"
    },
    538: {
        title: "Muta Stagna Senza Cerniera",
        description: "Muta stagna per ovviare ai fastidi e costi delle cerniere. Comoda e affidabile.",
        image: "public/catalogo/orizzontale.jpg"
    },
    989: {
        title: "Scarpette da Scoglio Junior",
        description: "Aquawalk Junior by Mares, adatta fondali accidentati. Perfetta per i giovani sub.",
        image: "public/catalogo/scarpette-mare-junior-mares.jpg"
    },
    131: {
        title: "Termogiacca",
        description: "Chiedere disponibilità di colore e taglia. Mantenimento del calore ottimale.",
        image: "public/catalogo/termogiacca.jpg"
    },
    540: {
        title: "Bermuda Nero Standard 3,5 mm",
        description: "Sopramuta foderato esterno e spaccato interno da 3,5 mm. Resistente e confortevole.",
        image: "public/catalogo/BERMUDA%20A%20TAGLIA.jpg"
    },
    978: {
        title: "Pinne Anfibie",
        description: "Pinne per camminare in sicurezza prima e dopo l'immersione. Versatile e pratica.",
        image: "public/catalogo/images%201_1.jpg"
    },
    622: {
        title: "Staffa Roll Completa",
        description: "Prodotto italiano, reversibile destra/sinistra e ribaltabile. Alta qualità Made in Italy.",
        image: "public/catalogo/SANY0049.jpg"
    },
    542: {
        title: "Testata Sottovuoto Alleggerita 11",
        description: "Made in Italy, con guarnizione polivalente. Leggera e performante.",
        image: "public/catalogo/SANY2399.jpg"
    },
    6: {
        title: "Plancetta",
        description: "Concepita per fungere da mezzo nautico di appoggio. Stabile e affidabile.",
        image: "public/catalogo/plancetta.jpg"
    }
};

// Get product ID from URL
function getProductId() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('id');
}

// Load product data
function loadProduct() {
    const productId = getProductId();
    const product = products[productId];

    if (product) {
        document.getElementById('product-title').textContent = product.title;
        document.getElementById('product-description').textContent = product.description;
        document.getElementById('product-image').src = product.image;
        document.getElementById('product-image').alt = product.title;
        document.title = product.title + ' - Neos Sub';
    } else {
        document.getElementById('product-title').textContent = 'Prodotto non trovato';
        document.getElementById('product-description').textContent = 'Il prodotto richiesto non è disponibile.';
        document.getElementById('product-image').src = 'img_home/logo_neos.png';
        document.getElementById('product-image').alt = 'Neos Sub Logo';
    }
}

// Initialize when page loads
$(document).ready(function() {
    loadProduct();
});
</script>

<script src="neos-sub.js"></script>
